name: TG Image Sender

on:
  repository_dispatch:
    types: [web_crawl]

jobs:
  send-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Scraper and Send to TG
        run: |
          # 传入：关键词、数量、机器人Token(从Secret读取)、ChatID(从Payload读取)
          python main.py "${{ github.event.client_payload.keyword }}" \
                         ${{ github.event.client_payload.num }} \
                         "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
                         "${{ github.event.client_payload.chat_id }}"
